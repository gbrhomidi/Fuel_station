name: Generate Room Schema

on:
  workflow_dispatch:  # تشغيل يدوي فقط

jobs:
  generate-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Generate Room Schema
        run: ./gradlew :app:kspDebugKotlin --stacktrace --info

      - name: Upload Schema Files
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: app/schemas/
          retention-days: 7
