name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.9'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ═══════════════════════════════════════════════════════════
      # 1. Checkout
      # ═══════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ═══════════════════════════════════════════════════════════
      # 2. Setup JDK
      # ═══════════════════════════════════════════════════════════
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # ═══════════════════════════════════════════════════════════
      # 3. Setup Gradle
      # ═══════════════════════════════════════════════════════════
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      # ═══════════════════════════════════════════════════════════
      # 4. Cache Gradle
      # ═══════════════════════════════════════════════════════════
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ═══════════════════════════════════════════════════════════
      # 5. Make gradlew executable
      # ═══════════════════════════════════════════════════════════
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ═══════════════════════════════════════════════════════════
      # 6. Run Lint
      # ═══════════════════════════════════════════════════════════
      - name: Run Lint
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # 7. Run Unit Tests
      # ═══════════════════════════════════════════════════════════
      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # 8. Build APK
      # ═══════════════════════════════════════════════════════════
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # ═══════════════════════════════════════════════════════════
      # 9. Sign Release APK (optional)
      # ═══════════════════════════════════════════════════════════
      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ═══════════════════════════════════════════════════════════
      # 10. Upload Debug APK
      # ═══════════════════════════════════════════════════════════
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ═══════════════════════════════════════════════════════════
      # 11. Upload Release APK
      # ═══════════════════════════════════════════════════════════
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ═══════════════════════════════════════════════════════════
      # 12. Create GitHub Release (for release builds)
      # ═══════════════════════════════════════════════════════════
      - name: Create Release
        if: github.event.inputs.build_type == 'release' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Fuel Station App Release v${{ github.run_number }}

            ### Changes
            - Auto-generated release from GitHub Actions

            ### Download
            - APK attached below
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
