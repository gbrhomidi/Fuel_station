name: Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (تطابق JavaVersion 17 المستخدم بالمشروع)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. إعداد إدارة وتحسين كاش Gradle لتسريع عمليات التجميع اللاحقة
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # 4. منح صلاحية التشغيل لملف gradlew
      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      # 5. تشغيل عملية البناء الفعلية
      # تم استخدام --no-daemon وتمرير حدود ذاكرة الـ Heap لضمان استقرار السيرفر
      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:+UseParallelGC"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6. رفع ملف الـ APK الناتج كملف مخرجات لتتمكن من تنزيله وتثبيته
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fuel-Station-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
